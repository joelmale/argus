name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: argus
          POSTGRES_USER: argus
          POSTGRES_PASSWORD: argus_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U argus -d argus"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://argus:argus_dev_password@127.0.0.1:5432/argus
      APP_SECRET_KEY: ci-test-secret
      APP_DEBUG: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r backend/requirements-dev.txt
      - name: Run migrations
        run: python backend/scripts/migrate.py
      - name: Lint
        run: npm run lint:backend:local
      - name: Test with coverage
        run: cd backend && PYTHONPATH=. pytest tests --cov=app --cov-config=.coveragerc --cov-report=term-missing --cov-report=xml --cov-fail-under=55 -q
      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: backend/coverage.xml

  frontend-lint-typecheck:
    name: Frontend — lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: cd frontend && npm ci
      - name: Lint
        run: npm run lint:frontend
      - name: Type-check
        run: npm run type-check
      - name: Build
        run: npm run build:frontend

  docker-build:
    name: Docker — build all images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend
        run: docker build ./backend -t argus-backend:ci
      - name: Build frontend
        run: docker build ./frontend -t argus-frontend:ci
