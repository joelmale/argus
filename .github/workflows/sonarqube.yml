name: SonarQube

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  scan:
    name: SonarQube scan
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: argus
          POSTGRES_USER: argus
          POSTGRES_PASSWORD: argus_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U argus -d argus"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://argus:argus_dev_password@127.0.0.1:5432/argus
      REDIS_URL: redis://127.0.0.1:6379/0
      APP_SECRET_KEY: ci-test-secret
      APP_DEBUG: "false"
      APP_ENV: test
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend dependencies
        run: pip install -r backend/requirements-dev.txt
      - name: Install frontend dependencies
        run: cd frontend && npm ci
      - name: Run database migrations
        run: cd backend && PYTHONPATH=. python scripts/migrate.py
      - name: Generate backend coverage
        run: cd backend && PYTHONPATH=. pytest tests --cov=app --cov-config=.coveragerc --cov-report=xml -q
      - name: Prepare Sonar arguments
        id: sonar_args
        run: |
          if [ -z "${SONAR_PROJECT_KEY}" ]; then
            echo "SONAR_PROJECT_KEY repository variable is required" >&2
            exit 1
          fi
          if [ -z "${SONAR_TOKEN}" ]; then
            echo "SONAR_TOKEN repository secret is required" >&2
            exit 1
          fi
          args="-Dsonar.projectKey=${SONAR_PROJECT_KEY} -Dsonar.projectName=Argus -Dsonar.qualitygate.wait=true"
          if [ -n "${SONAR_ORGANIZATION}" ]; then
            args="${args} -Dsonar.organization=${SONAR_ORGANIZATION}"
          fi
          echo "value<<EOF" >> "$GITHUB_OUTPUT"
          echo "${args}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        with:
          args: ${{ steps.sonar_args.outputs.value }}
