name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docs: ${{ steps.filter.outputs.docs }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'scanner/**'
            frontend:
              - 'frontend/**'
            docs:
              - 'website/**'
            shared:
              - '.github/workflows/**'
              - 'package.json'
              - 'docker-compose.yml'
              - 'docker-compose.dev.yml'
              - 'scripts/**'

  backend-quality:
    name: Backend quality
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: argus
          POSTGRES_USER: argus
          POSTGRES_PASSWORD: argus_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U argus -d argus"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://argus:argus_dev_password@127.0.0.1:5432/argus
      REDIS_URL: redis://127.0.0.1:6379/0
      APP_SECRET_KEY: ci-test-secret
      APP_DEBUG: "false"
      APP_ENV: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install backend dependencies
        run: pip install -r backend/requirements-dev.txt
      - name: Run database migrations
        run: cd backend && PYTHONPATH=. python scripts/migrate.py
      - name: Lint backend
        run: npm run lint:backend:local
      - name: Test backend with coverage
        run: cd backend && PYTHONPATH=. pytest tests --cov=app --cov-config=.coveragerc --cov-report=term-missing --cov-report=xml --cov-fail-under=55 -q
      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: backend/coverage.xml
          retention-days: 5

  frontend-quality:
    name: Frontend quality
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: cd frontend && npm ci
      - name: Lint frontend
        run: npm run lint:frontend
      - name: Type-check frontend
        run: npm run type-check
      - name: Build frontend
        run: npm run build:frontend

  docs-quality:
    name: Docs build
    needs: changes
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: website/package-lock.json
      - name: Install docs dependencies
        run: cd website && npm ci
      - name: Build docs site
        run: npm run docs:build
