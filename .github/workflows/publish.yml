name: Publish Release Assets

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: publish-release-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-release-assets:
    name: Build docs and release assets
    runs-on: ubuntu-latest
    outputs:
      docs_archive: ${{ steps.asset_names.outputs.docs_archive }}
      source_archive: ${{ steps.asset_names.outputs.source_archive }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: website/package-lock.json
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Install docs dependencies
        run: cd website && npm ci
      - name: Build docs site
        run: npm run docs:build
      - name: Set asset names
        id: asset_names
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            TAG="${{ github.event.release.tag_name }}"
          fi
          echo "docs_archive=argus-docs-${TAG}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "source_archive=argus-source-${TAG}.tar.gz" >> "$GITHUB_OUTPUT"
      - name: Create docs archive
        run: tar -C website/build -czf "${{ steps.asset_names.outputs.docs_archive }}" .
      - name: Create clean source archive
        run: git archive --format=tar.gz --output "${{ steps.asset_names.outputs.source_archive }}" HEAD
      - name: Upload docs Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: website/build
      - name: Upload release asset bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            ${{ steps.asset_names.outputs.docs_archive }}
            ${{ steps.asset_names.outputs.source_archive }}
          retention-days: 7

  deploy-docs:
    name: Deploy docs to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-release-assets
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  attach-release-assets:
    name: Attach archives to GitHub Release
    runs-on: ubuntu-latest
    needs: build-release-assets
    if: github.event_name == 'release'
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets
      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/${{ needs.build-release-assets.outputs.docs_archive }}
            release-assets/${{ needs.build-release-assets.outputs.source_archive }}
