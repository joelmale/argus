name: Release Images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

jobs:
  publish:
    name: Publish ${{ matrix.image_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: argus-backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            target: runtime
          - image_name: argus-scanner
            context: .
            dockerfile: ./scanner/Dockerfile
            target: ""
          - image_name: argus-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            target: runner
    steps:
      - uses: actions/checkout@v4
      - name: Set lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.OWNER_LC }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=main
            type=sha,format=short
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
      - name: Prepare local scan tag
        id: scan_tag
        run: echo "value=ghcr.io/${OWNER_LC}/${{ matrix.image_name }}:scan-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
      - name: Build local image for scanning
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          load: true
          tags: ${{ steps.scan_tag.outputs.value }}
      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.scan_tag.outputs.value }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          exit-code: "1"
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: ${{ matrix.image_name }}
      - name: Build and push release image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          provenance: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Resolve primary tag
        id: image_ref
        run: |
          echo "value=$(echo '${{ steps.meta.outputs.tags }}' | head -n1)" >> "$GITHUB_OUTPUT"
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign image with Cosign keyless
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: cosign sign --yes ${{ steps.image_ref.outputs.value }}@${{ steps.build.outputs.digest }}
