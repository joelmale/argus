# Development overrides — mount source for hot reload
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    command: sh -c "python scripts/migrate.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s = socket.create_connection(('127.0.0.1', 8000), 5); s.close()",
        ]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 45s

  scanner:
    build:
      context: .
      dockerfile: scanner/Dockerfile
    # Celery watchdog reloads worker when Python files change
    command: >
      celery -A app.workers.tasks.celery_app worker
        --loglevel=info
        --autoscale=4,1
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql+asyncpg://argus:argus_dev_password@localhost:5432/argus}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://localhost:6379/0}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
    network_mode: host

  scanner-beat:
    build:
      context: .
      dockerfile: scanner/Dockerfile
    command: >
      celery -A app.workers.tasks.celery_app beat
        --loglevel=info
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql+asyncpg://argus:argus_dev_password@localhost:5432/argus}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://localhost:6379/0}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
    network_mode: host

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: >
      sh -c '
        LOCKFILE_HASH=$$(sha256sum package-lock.json | awk "{print \$$1}");
        INSTALLED_HASH=$$(cat node_modules/.package-lock.hash 2>/dev/null || true);
        if [ ! -x node_modules/.bin/next ] || [ "$$LOCKFILE_HASH" != "$$INSTALLED_HASH" ]; then
          npm ci &&
          printf "%s" "$$LOCKFILE_HASH" > node_modules/.package-lock.hash;
        fi &&
        find .next -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true &&
        npm run dev
      '
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    environment:
      NODE_ENV: development

volumes:
  frontend_node_modules:
  frontend_next:
