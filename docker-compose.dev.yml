# Development overrides — mount source for hot reload
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app

  scanner:
    # Celery watchdog reloads worker when Python files change
    command: >
      celery -A app.workers.tasks.celery_app worker
        --loglevel=info -B
        --autoscale=4,1
    volumes:
      - ./backend:/app

  frontend:
    command: >
      sh -c '
        LOCKFILE_HASH=$$(sha256sum package-lock.json | awk "{print \$$1}");
        INSTALLED_HASH=$$(cat node_modules/.package-lock.hash 2>/dev/null || true);
        if [ ! -x node_modules/.bin/next ] || [ "$$LOCKFILE_HASH" != "$$INSTALLED_HASH" ]; then
          npm ci &&
          printf "%s" "$$LOCKFILE_HASH" > node_modules/.package-lock.hash;
        fi &&
        npm run dev
      '
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      NODE_ENV: development

volumes:
  frontend_node_modules:
