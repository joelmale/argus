# Development overrides — mount source for hot reload
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app

  scanner:
    # Celery watchdog reloads worker when Python files change
    command: >
      celery -A app.workers.tasks.celery_app worker
        --loglevel=info -B
        --autoscale=4,1
    volumes:
      - ./backend:/app

  frontend:
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
